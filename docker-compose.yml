version: "3.8"

services:
  bot:
    build: .
    container_name: weather_bot
    restart: always
    env_file:
      - .env # 继承所有配置
    environment:
      # 只覆盖 Docker 内部不同的变量
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Shanghai
    volumes:
      # 日志目录
      - ./logs:/app/logs
      # 持久化数据
      - ./data:/app/data
    depends_on:
      - redis
    networks:
      - weather_net

  redis:
    image: redis:alpine
    container_name: weather_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - weather_net

volumes:
  redis_data:

networks:
  weather_net:
    driver: bridge
