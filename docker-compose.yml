services:
  bot:
    build: .
    container_name: weather_bot
    restart: always
    env_file:
      - .env # 继承所有配置
    environment:
      # 只覆盖 Docker 内部不同的变量
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Shanghai
    volumes:
      # 日志目录
      - ./logs:/app/logs
      # 持久化数据
      - ./data:/app/data
    ports:
      # Webhook 模式需要暴露 Bot 监听端口给宿主机/1Panel 反代；Polling 模式可删除或注释本段。
      # 左侧是宿主机端口，右侧是容器内 WEBHOOK_PORT；默认使用 8443。
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    depends_on:
      - redis
    networks:
      - weather_net

  redis:
    image: redis:alpine
    container_name: weather_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - weather_net

volumes:
  redis_data:

networks:
  weather_net:
    driver: bridge
